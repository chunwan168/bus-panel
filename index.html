<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴士到站資訊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: #ffffff;
            color: #000000;
            margin: 0;
            padding: 12px;
            line-height: 1.35;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            border: 4px solid #000;
            padding: 18px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin: 0 0 16px 0;
            border-bottom: 3px solid #000;
            padding-bottom: 8px;
        }
        .route {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #999;
        }
        .route:last-child { border-bottom: none; }
        .route-num {
            font-size: 27px;
            font-weight: bold;
            width: 78px;
            text-align: center;
            border-right: 3px solid #000;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .route-info { flex: 1; }
        .dest {
            font-size: 16px;
            margin-bottom: 4px;
            color: #222;
            font-weight: bold;
        }
        .time {
            font-size: 32px;
            font-weight: bold;
        }
        .count {
            font-size: 14.5px;
            color: #333;
        }
        .no-bus {
            font-size: 16px;
            color: #666;
            font-style: italic;
        }
        button {
            display: block;
            margin: 22px auto 8px;
            padding: 11px 26px;
            background: #000;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            max-width: 260px;
            cursor: pointer;
        }
        button:active { background: #333; }
        .footer {
            text-align: center;
            font-size: 13px;
            color: #444;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>巴士實時到站</h1>

        <div id="routes"></div>

        <button onclick="fetchAllETAs()">重新整理</button>
        <div class="footer" id="update-time"></div>
    </div>

    <script>
        const STOPS = ["BCC6E5BA6810FED6", "YL357", "YL356"];
        const ROUTES = [
            "276P", "53", "68A", "68X", "268B", "268P", "268X", 
            "269D", "E36", "N269", "N30", "B1", "64X", "76K"
        ];

        // 水邊圍邨主要目的地對照表
        const TERMINAL_NAMES = {
            "276P": "上水",
            "53": "元朗 型點",
            "68A": "朗屏邨",
            "68X": "旺角東站",
            "268B": "紅磡碼頭",
            "268P": "觀塘碼頭",
            "268X": "佐敦(西九龍站)",
            "269D": "瀝源",
            "E36": "八鄉路",
            "N269": "美孚",
            "N30": "元朗站",
            "B1": "落馬洲支線",
            "64X": "香港科學園",
            "76K": "清河邨"
        };

        async function fetchETA(route, stop, dir) {
            try {
                const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${stop}/${route}/${dir}`);
                let data = await response.json();
                return data.data || [];
            } catch (e) { return []; }
        }

        function isFuture(etaStr) {
            if (!etaStr) return false;
            return new Date(etaStr) > new Date(Date.now() - 180000);
        }

        async function fetchAllETAs() {
            const container = document.getElementById('routes');
            container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#555;">查詢中...</div>';

            const promises = [];
            for (const route of ROUTES) {
                for (const stopId of STOPS) {
                    // 同時請求方向 1 與 方向 2，涵蓋所有班次可能
                    promises.push(fetchETA(route, stopId, 1).then(e => ({ route, etas: e })));
                    promises.push(fetchETA(route, stopId, 2).then(e => ({ route, etas: e })));
                }
            }

            const results = await Promise.all(promises);
            let html = '';

            for (const route of ROUTES) {
                const allEtas = results.filter(r => r.route === route).flatMap(r => r.etas);
                const validEtas = allEtas.filter(e => e.eta && isFuture(e.eta));
                validEtas.sort((a, b) => new Date(a.eta) - new Date(b.eta));
                
                const best = validEtas[0];

                html += `<div class="route"><div class="route-num">${route}</div><div class="route-info">`;
                
                if (best) {
                    const min = Math.round((new Date(best.eta) - new Date()) / 60000);
                    // 優先使用 API 返回的總站名稱，若無則使用列表對照
                    const destName = best.dest_tc ? `往 ${best.dest_tc}` : `往 ${TERMINAL_NAMES[route]}`;
                    html += `<div class="dest">${destName}</div>`;
                    html += `<div class="time">${best.eta.substring(11, 16)}</div>`;
                    html += `<div class="count">${min > 0 ? min + ' 分鐘後' : '即將到達'}</div>`;
                } else {
                    html += `<div class="dest">往 ${TERMINAL_NAMES[route] || '目的地'}</div>`;
                    html += `<div class="no-bus">今日服務已結束</div>`;
                }
                html += `</div></div>`;
            }

            container.innerHTML = html;
            document.getElementById('update-time').textContent = '更新於 ' + new Date().toLocaleTimeString('zh-HK');
        }

        window.onload = fetchAllETAs;
        setInterval(fetchAllETAs, 30000);
    </script>
</body>
</html>
