<script>
    const STATIONS_CONFIG = [
        {
            name: '西行站',
            stopId: '8097C239EBB9C5AF', 
            routes: ['53', '269D', 'E36', 'E36C', 'E36S', 'N269']
        },
        {
            name: '東行站',
            stopId: 'E478149A709E7B15', 
            routes: ['64X', '268B', '276P', 'N30', 'N276']
        }
    ];

    async function fetchAllBusETA() {
        const container = document.getElementById('eta-container');
        const timeSpan = document.getElementById('update-time');
        const now = new Date();
        let allCombinedData = [];
        let hasError = false;

        try {
            // 同時請求兩個站點的 API
            const requests = STATIONS_CONFIG.map(config => 
                fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${config.stopId}`)
                    .then(res => {
                        if (!res.ok) throw new Error(`${config.name} 請求失敗`);
                        return res.json();
                    })
                    .then(result => {
                        if (!result.data) return [];
                        // 篩選指定路線
                        return result.data.filter(item => config.routes.includes(item.route));
                    })
                    .catch((err) => {
                        console.error(err);
                        hasError = true; // 標記有單邊站點出錯
                        return [];
                    })
            );

            const resultsArray = await Promise.all(requests);
            resultsArray.forEach(data => {
                allCombinedData = allCombinedData.concat(data);
            });

            // 更新時間標籤
            const timeString = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            timeSpan.innerText = `最後更新: ${timeString} ${hasError ? '(部分數據獲取失敗)' : ''}`;

            if (allCombinedData.length === 0) {
                if (hasError) {
                    container.innerHTML = '<div class="loading" style="border-color:#000;">API 連線失敗，請重新整理或檢查 Web 伺服器環境。</div>';
                } else {
                    container.innerHTML = '<div class="loading">目前非服務時間，或未來一小時內無巴士經過此站。</div>';
                }
                return;
            }

            // 依到站時間大排序
            allCombinedData.sort((a, b) => {
                if (!a.eta) return 1;
                if (!b.eta) return -1;
                return new Date(a.eta) - new Date(b.eta);
            });

            // 限制最多顯示 7 班車
            const limitedData = allCombinedData.slice(0, 7);

            let htmlContent = `
                <table class="eta-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">路線</th>
                            <th style="width: 55%;">目的地</th>
                            <th style="width: 25%;">預計到站</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            limitedData.forEach(etaItem => {
                let timeDisplay = '---';
                let isArriving = false;

                if (etaItem.eta) {
                    const etaTime = new Date(etaItem.eta);
                    const diffMs = etaTime - now;
                    const diffMins = Math.max(0, Math.ceil(diffMs / 60000));

                    if (diffMins <= 1) {
                        timeDisplay = '即將到站';
                        isArriving = true;
                    } else {
                        timeDisplay = `${diffMins} 分鐘`;
                    }
                } else {
                    timeDisplay = '暫無班次';
                }

                htmlContent += `
                    <tr>
                        <td><span class="route-badge">${etaItem.route}</span></td>
                        <td><span class="dest-text">${etaItem.dest_tc}</span></td>
                        <td><span class="${isArriving ? 'time-highlight' : ''}">${timeDisplay}</span></td>
                    </tr>
                `;
            });

            htmlContent += `</tbody></table>`;
            container.innerHTML = htmlContent;

        } catch (error) {
            console.error('數據處理出錯:', error);
            timeSpan.innerText = '更新失敗';
            container.innerHTML = `<div class="error-msg"><p>未能載入實實數據，請稍後再試</p></div>`;
        }
    }

    fetchAllBusETA();
    setInterval(fetchAllBusETA, 30000);
</script>
